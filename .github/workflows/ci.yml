name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".claude/**"
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".claude/**"
      - "**/CLAUDE.md"
      - "**/AGENTS.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  text-lint:
    uses: cboone/gh-actions/.github/workflows/text-lint.yml@main
    with:
      run-cspell: true

  github-lint:
    uses: cboone/gh-actions/.github/workflows/github-lint.yml@main
