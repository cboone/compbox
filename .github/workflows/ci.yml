name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".claude/**"
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".claude/**"
      - "**/CLAUDE.md"
      - "**/AGENTS.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  text-lint:
    uses: cboone/gh-actions/.github/workflows/text-lint.yml@v1
    with:
      run-cspell: true

  github-lint:
    uses: cboone/gh-actions/.github/workflows/github-lint.yml@v1

  lint-md:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run markdownlint
        run: npx markdownlint-cli2@0.21.0 "**/*.md"

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Prettier check
        run: npx prettier@3.8.1 --check .

  check-zsh:
    name: Check zsh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh shellcheck devscripts

      - name: Install shfmt
        env:
          VERSION: "3.13.0"
          SHA256: "70aa99784703a8d6569bbf0b1e43e1a91906a4166bf1a79de42050a6d0de7551"
        run: |
          curl -sSfL -o shfmt \
            "https://github.com/mvdan/sh/releases/download/v${VERSION}/shfmt_v${VERSION}_linux_amd64"
          echo "${SHA256}  shfmt" | sha256sum --check
          sudo install -m 755 shfmt /usr/local/bin/shfmt

      - name: Install shellharden
        env:
          VERSION: "4.3.1"
          SHA512: "db95f075fef1a2ec604d18e5c366d396cd4622b64e5a44ef1f4aa2068d6f050d7ac426a4906dc44b612072a319954e96a16dad9030055d3158dd3518e48f111c"
        run: |
          curl -sSfL -o shellharden.tar.gz \
            "https://github.com/anordal/shellharden/releases/download/v${VERSION}/shellharden-x86_64-unknown-linux-gnu.tar.gz"
          echo "${SHA512}  shellharden.tar.gz" | sha512sum --check
          tar xzf shellharden.tar.gz
          sudo mv shellharden /usr/local/bin/

      - name: Run zsh checks
        run: make check-zsh

  test-scrut:
    uses: cboone/gh-actions/.github/workflows/scrut.yml@v1
    with:
      scrut-shell: zsh
      scrut-test-dir: "tests/scrut/"
      scrut-setup-cmd: sudo apt-get update && sudo apt-get install -y zsh

  test-zunit:
    name: Test (zunit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install revolver
        env:
          COMMIT: "6424e6cb14da38dc5d7760573eb6ecb2438e9661"
          SHA256: "ad2a753561b9c603b6bd16f59b40799a33d747cc8468d6e6da4078abb974f845"
        run: |
          curl -sSfL -o revolver \
            "https://raw.githubusercontent.com/molovo/revolver/${COMMIT}/revolver"
          echo "${SHA256}  revolver" | sha256sum --check
          sudo install -m 755 revolver /usr/local/bin/revolver

      - name: Install color
        env:
          COMMIT: "57c9cd51c0495a3faffb203c8db74e0f60f3db73"
          SHA256: "5b783553195fc194210a3d181a563a4632a8f1307c3c85d15b1c6af047977522"
        run: |
          curl -sSfL -o color.zsh \
            "https://raw.githubusercontent.com/molovo/color/${COMMIT}/color.zsh"
          echo "${SHA256}  color.zsh" | sha256sum --check
          sudo install -m 755 color.zsh /usr/local/bin/color

      - name: Install zunit
        env:
          VERSION: "0.8.2"
          COMMIT: "bce183c39a3b51a3dd838835516a37222aad921f"
        run: |
          git clone --branch "v${VERSION}" --depth 1 \
            https://github.com/zunit-zsh/zunit.git /tmp/zunit
          cd /tmp/zunit
          test "$(git rev-parse HEAD)" = "${COMMIT}"
          ./build.zsh
          sudo install -m 755 zunit /usr/local/bin/zunit

      - name: Run zunit tests
        run: make test-zunit

  bench-smoke:
    name: Benchmark (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install zsh and jq
        run: sudo apt-get update && sudo apt-get install -y zsh jq

      - name: Install hyperfine
        env:
          VERSION: "1.20.0"
          SHA256: "e0391897ffb490af8a6b64e0e4281ac2c8e10cbcbb875bd22a376f44cdb263ab"
        run: |
          curl -sSfL -o hyperfine.deb \
            "https://github.com/sharkdp/hyperfine/releases/download/v${VERSION}/hyperfine_${VERSION}_amd64.deb"
          echo "${SHA256}  hyperfine.deb" | sha256sum --check
          sudo dpkg -i hyperfine.deb

      - name: Run benchmark smoke
        run: zsh scripts/bench/run.zsh --smoke --json-out "${RUNNER_TEMP}/bench-smoke.json"

      - name: Upload benchmark smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-smoke-json
          path: ${{ runner.temp }}/bench-smoke.json
