name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".claude/**"
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".claude/**"
      - "**/CLAUDE.md"
      - "**/AGENTS.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  text-lint:
    uses: cboone/gh-actions/.github/workflows/text-lint.yml@v1
    with:
      run-cspell: true

  github-lint:
    uses: cboone/gh-actions/.github/workflows/github-lint.yml@v1

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install scrut
        run: cargo install --locked scrut

      - name: Run tests
        run: make test
